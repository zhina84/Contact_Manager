<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager - Add Contact</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px}
        .container{background:white; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.1); width:100%; max-width:500px}
        .header{background:#4a6cf7; color:white; padding:30px; text-align:center}
        .form-container{padding:30px}
        .form-group{margin-bottom:20px}
        label{display:block; margin-bottom:8px; font-weight:600; color:#333}
        input, select{width:100%; padding:12px 15px; border:2px solid #e0e0e0; border-radius:10px; font-family:inherit}
        input:focus, select:focus{outline:none; border-color:#4a6cf7}
        button{width:100%; background:#4a6cf7; color:white; border:none; padding:14px; border-radius:10px; font-weight:600; cursor:pointer; margin-top:10px}
        button:hover{background:#3451c9}
        .nav-links{text-align:center; margin-top:25px; padding-top:20px; border-top:1px solid #eee}
        .nav-links a{color:#4a6cf7; text-decoration:none; margin:0 10px}
    </style>
</head>
<body>
<div class="container"> 
    <div class="header">
        <h1>📇 Add New Contact</h1>
        <p>Enter the details below</p>
    </div>
    <div class="form-container">
        <form action="/save" method="post">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" placeholder="e.g., John Doe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" placeholder="e.g., New York, London">
            </div>
            <div class="form-group">
                <label>Group / دسته‌بندی</label>
                <select name="group">
                    <option value="خانواده">👨‍👩‍👧‍👦 خانواده</option>
                    <option value="دوستان">👫 دوستان</option>
                    <option value="همکاران">💼 همکاران</option>
                    <option value="سایر">📁 سایر</option>
                </select>
            </div>
            <button type="submit">💾 Save Contact</button>
        </form>
        <div class="nav-links">
            <a href="/search">🔍 Search Contacts</a>
        </div>
    </div>
</div>
</body>
</html>
